<!DOCTYPE html>
<html>
<head>
	<title>My carculator app</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
	<section class="carculator-section">
		<div class="main-containor">
			<label for="num1">First Number</label>
			<input type="text" id="num1">
			<select id="operator">
			<option>+</option>
			<option>-</option>
			<option>*</option>
			<option>/</option>
		</select>
		<label for="num2">Second Number</label>
		<input type="text" name="num2">
		<button class="btn" id="carculator-btn" onclick="calculate()">Carculate</button>
	</div>
	<div class="result-container">
		<div class="result" id="result"></div>
	</div>

	</section>
	<script type="text/javascript" sre="script/js"></script>

</body>
</html>
